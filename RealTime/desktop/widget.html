<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时对话</title>
    <link rel="stylesheet" href="widget.css">
</head>
<body>
    <!-- 简易调试控制台：用于捕获 oh-my-live2d 的报错 -->
    <div id="debug-console" style="display:none; position:fixed; top:0; left:0; right:0; max-height:150px; overflow-y:auto; background:rgba(100,0,0,0.8); color:#fff; z-index:9999; font-size:10px; padding:4px; pointer-events:none;"></div>
    <script>
        (function() {
            var dbg = document.getElementById('debug-console');
            var oldErr = console.error;
            console.error = function() {
                dbg.style.display = 'block';
                var msg = Array.from(arguments).join(' ');
                dbg.innerHTML += '<div>❌ ' + msg + '</div>';
                oldErr.apply(console, arguments);
            };
            window.addEventListener('error', function(e) {
                dbg.style.display = 'block';
                dbg.innerHTML += '<div>❌ window.error: ' + e.message + '</div>';
            });
            window.addEventListener('unhandledrejection', function(e) {
                dbg.style.display = 'block';
                dbg.innerHTML += '<div>❌ unhandled promise: ' + Object.prototype.toString.call(e.reason)==='[object Error]'?e.reason.message:e.reason + '</div>';
            });
        })();
    </script>

    <div class="widget-shell">
        <!-- 标题栏 (拖拽区域) -->
        <div class="title-bar">
            <div class="title">
                <span class="dot" id="status-dot"></span>
                <span id="status-text">连接中...</span>
            </div>
            <div class="title-controls">
                <button id="btn-settings" title="设置">⚙</button>
                <button class="close" id="btn-close" title="关闭" onclick="window.close()">✕</button>
            </div>
        </div>

        <!-- 设置面板 (折叠) -->
        <div class="settings-panel" id="settings">
            <label>角色模型</label>
            <div style="display: flex; gap: 6px;">
                <select id="cfg-character" style="flex: 1;">
                    <option value="">-- 加载中 --</option>
                </select>
                <button class="btn-sm secondary" id="btn-refresh-chars" style="width: auto; padding: 7px 10px;">↻</button>
            </div>
            <label>参考音频路径</label>
            <input type="text" id="cfg-ref-audio" placeholder="自动从后端加载">
            <div class="settings-row">
                <div>
                    <label>语言</label>
                    <select id="cfg-lang">
                        <option value="zh">中文</option>
                        <option value="ja">日语</option>
                        <option value="en">英语</option>
                    </select>
                </div>
                <div>
                    <label>&nbsp;</label>
                    <button class="btn-sm" id="btn-warmup">🔥 预热模型</button>
                </div>
            </div>
            <button class="btn-sm secondary" id="btn-clear" style="margin-top: 4px;">🗑 清空对话</button>
        </div>



        <!-- 对话区 -->
        <div class="chat-container" id="chat">
            <div class="msg assistant">你好~ 有什么想聊的吗？</div>
        </div>

        <!-- 语音识别状态 -->
        <div class="stt-indicator" id="stt-bar">
            🎙️ <span>正在聆听...</span>
        </div>

        <!-- 输入区 -->
        <div class="input-bar">
            <button class="btn-circle btn-mic" id="btn-mic" title="语音输入">🎤</button>
            <input type="text" id="input" placeholder="说点什么..." autocomplete="off">
            <button class="btn-circle btn-send" id="btn-send" title="发送">➤</button>
            <button class="btn-circle btn-interrupt" id="btn-interrupt" title="打断">⏹</button>
        </div>

        <!-- 底部状态条 -->
        <div class="status-strip">
            <span>实时对话</span>
            <span id="vts-status" style="margin-left: 8px; font-size: 0.9em; cursor: pointer;" title="点击重连VTS">VTS: 🔴</span>
            <div class="latency">
                <span>首Token <span class="val" id="lat-first">-</span></span>
                <span>首音频 <span class="val" id="lat-audio">-</span></span>
            </div>
        </div>
    </div>


    <script src="vts_manager.js"></script>
    <script src="widget.js"></script>
</body>
</html>
